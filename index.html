    // Check for stream param to auto-play in popup
    const urlParams = new URLSearchParams(window.location.search);
    const streamUrl = urlParams.get('stream');
    
    window.addEventListener('DOMContentLoaded', () => {
      if (streamUrl) {
        // We're in popup - auto play the stream
        document.getElementById('floatPlayer').style.display = 'none';
        document.querySelector('.container').style.height = '100vh';
        
        const player = document.getElementById('player');
        player.style.display = 'block';
        
        if (streamUrl.includes('.m3u8')) {
          if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(player);
            player.play();
          }
        } else {
          // iframe for non-m3u8 URLs
          let iframe = document.getElementById('yonoFrame');
          if (!iframe) {
            iframe = document.createElement('iframe');
            iframe.id = 'yonoFrame';
            iframe.style.cssText = 'width:100%;height:calc(100vh - 120px);border:none;';
            document.querySelector('.video-wrap').appendChild(iframe);
          }
          player.style.display = 'none';
          iframe.style.display = 'block';
          iframe.src = streamUrl;
        }
        
        document.getElementById('nowPlaying').textContent = 'Playing in Popup';
      }
    });
    
    // Heartbeat - live user tracking
    (function(){
      var sid = '';
      try { sid = localStorage.getItem('hb_sid') || crypto.randomUUID(); localStorage.setItem('hb_sid', sid); } catch(e) { sid = 'anon_' + Date.now(); }
      var hbPage = window.location.pathname;
      function sendHeartbeat(playing) {
        fetch('/api/heartbeat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ sessionId:sid, page: playing ? hbPage + ' (playing)' : hbPage }) }).catch(function(){});
      }
      sendHeartbeat(false);
      setInterval(function(){ sendHeartbeat(false); }, 30000);
      var origPlay = HTMLVideoElement.prototype.play;
      HTMLVideoElement.prototype.play = function() { sendHeartbeat(true); return origPlay.apply(this, arguments); };
      document.addEventListener('playing', function(){ sendHeartbeat(true); }, true);
    })();

let hls = null;

    // Prefetch URL for faster load
    function prefetchUrl(url) {
      if (url && url.includes('.m3u8') && typeof Hls !== 'undefined') {
        if (!prefetchPlayer) {
          prefetchPlayer = document.createElement('video');
          prefetchPlayer.muted = true;
          prefetchPlayer.style.display = 'none';
          document.body.appendChild(prefetchPlayer);
        }
        if (prefetchHls) prefetchHls.destroy();
        prefetchHls = new Hls({fragLoadingMaxRetry: 1, manifestLoadingMaxRetry: 1});
        prefetchHls.loadSource(url);
        prefetchHls.attachMedia(prefetchPlayer);
      }
    }

    // CricHD Live Sports
    let crichdMatches = [];

    async function loadCricHD() {
      const grid = document.getElementById('liveMatchesGrid');
      grid.innerHTML = '<div class="crichd-loading"><div class="loading-spinner"></div>Loading live matches...</div>';

      try {
        const [cricRes, footyRes] = await Promise.all([
          fetch('/api/crichd'),
          fetch('/api/footystream').then(r => r.json()).catch(() => ({ success: false, events: [] })),
        ]);
        const data = await cricRes.json();

        if (!data.success || !data.matches || data.matches.length === 0) {
          grid.innerHTML = '<div class="crichd-error">No live matches found. Try again later.</div>';
          return;
        }

        if (footyRes.success && footyRes.events) {
          initLeagueLookup(footyRes.events);
        }

        crichdMatches = data.matches;
        renderCricHDMatches(data.matches);
        sectionCache['crichd'] = { html: grid.innerHTML, time: Date.now() };
      } catch (err) {
        grid.innerHTML = `<div class="crichd-error">Failed to load: ${err.message}</div>`;
      }
    }

    function getTeamLogoHtml(teamName) {
      if (!teamName) return '';
      const key = teamName.toLowerCase().trim()
        .replace(/^(1st|2nd|3rd|4th)\s+(semi-)?final\s*[:.-]?\s*/i, '')
        .replace(/^(super\s+)?final\s*[:.-]?\s*/i, '')
        .replace(/^\d+\w*\s+match\s*[:.-]?\s*/i, '')
        .replace(/\s*[,–-]\s*\d+\w*\s+match\s*/gi, '')
        .replace(/\s*\(.*?\)\s*/g, '')
        .replace(/\s*-\s*.*$/i, '')
        .trim();
      
      if (countryFlags[key]) {
        return `<img src="${countryFlags[key]}" style="width:60px;height:60px;object-fit:contain;border-radius:8px;" onerror="this.outerHTML='<span style=\\'display:inline-flex;align-items:center;gap:4px;background:#444;color:#fff;padding:3px 8px;border-radius:6px;font-size:13px;font-weight:600;\\'>🏏 ${teamName}</span>'">`;
      }

      let logoUrl = teamLogos[key];
      if (!logoUrl) {
        let bestTeam = null;
        let bestTeamLen = 0;
        for (const [name, url] of Object.entries(teamLogos)) {
          if (key.includes(name) && name.length > bestTeamLen) {
            bestTeam = url;
            bestTeamLen = name.length;
          }
          if (name.includes(key)) {
            bestTeam = url;
            break;
          }
        }
        if (bestTeam) logoUrl = bestTeam;
      }
      
      if (!logoUrl) {
        for (const [name, url] of Object.entries(countryFlags)) {
          if (key.includes(name) || name.includes(key)) {
            logoUrl = url;
            break;
          }
        }
      }
      
      if (logoUrl) {
        return `<img src="${logoUrl}" style="width:60px;height:60px;object-fit:contain;border-radius:8px;" onerror="this.outerHTML='<span style=\\'display:inline-flex;align-items:center;gap:4px;background:#444;color:#fff;padding:3px 8px;border-radius:6px;font-size:13px;font-weight:600;\\'>🏏 ${teamName}</span>'">`;
      }
      return `<span style="display:inline-flex;align-items:center;gap:4px;background:#444;color:#fff;padding:3px 8px;border-radius:6px;font-size:13px;font-weight:600;">🏏 ${teamName}</span>`;

    function parseMatchTitle(title) {
      const parts = title.split(/\s+vs\s+|\s+v\s+/i);
      if (parts.length >= 2) {
        let t1 = parts[0].trim();
        let t2 = parts.slice(1).join(' vs ').trim();
        // Strip prefixes like "56th Match:", "1st Test:", "Final:", etc.
        t1 = t1.replace(/^[\d]+\w*\s+(match|test|odi|t20|final|semi)\s*[:.-]?\s*/i, '').trim();
        t2 = t2.replace(/^[\d]+\w*\s+(match|test|odi|t20|final|semi)\s*[:.-]?\s*/i, '').trim();
        return { team1: t1, team2: t2, isVs: true };
      }
      return { team1: title, team2: '', isVs: false };
    }

    function formatLiveNow(day, time) {
      let cleanTime = time.replace(/IST\+?\d*(:\d*)?/gi, '').trim();
      let parts = cleanTime.match(/(\d+):(\d+)(?:\s*(AM|PM))?/i);
      if (parts) {
        let h = parseInt(parts[1]), m = parseInt(parts[2]);
        let a = (parts[3]||'').toUpperCase();
        if (a==='PM' && h<12) h+=12;
        if (a==='AM' && h===12) h=0;
        let d = new Date();
        d.setUTCHours(h,m,0,0);
        return `<span class="live-elapsed" data-utc="${d.getTime()}"></span>`;
      }
      return time || '';
    }

    function formatMatchTime(time, day, isLive) {
      let raw = time || '';
      let isToday = day === 'Today' || day.includes('Today');
      let isTomorrow = day === 'Tomorrow' || day.includes('Tomorrow');
      
      if (isToday && isLive) return formatLiveNow(day, time);
      
      // Remove IST/IST+5:30 etc from string
      let cleanTime = raw.replace(/IST\+?\d*(:\d*)?/gi, '').trim();
      if (!cleanTime) return raw;
      
      try {
        // Parse HH:MM (24h) or HH:MM AM/PM (12h)
        let parts = cleanTime.match(/(\d+):(\d+)(?:\s*(AM|PM))?/i);
        if (!parts) return raw;
        
        let hours = parseInt(parts[1]);
        let minutes = parseInt(parts[2]);
        let ampm = (parts[3] || '').toUpperCase();
        
        if (ampm === 'PM' && hours < 12) hours += 12;
        if (ampm === 'AM' && hours === 12) hours = 0;
        
        // Times from CricHD are in UTC (GMT+0)
        let d = new Date();
        if (isTomorrow) d.setDate(d.getDate() + 1);
        if (!isToday && !isTomorrow && day) {
          const dateParts = day.match(/(\d+)-(\d+)-(\d+)/);
          if (dateParts) {
            d = new Date(Date.UTC(dateParts[3], dateParts[2] - 1, dateParts[1]));
            // Check if parsed date is actually today
            const now = new Date();
            if (d.getUTCFullYear() === now.getUTCFullYear() && d.getUTCMonth() === now.getUTCMonth() && d.getUTCDate() === now.getUTCDate()) {
              isToday = true;
            } else if (isLive) {
              // Past-date channel-list entry with isLive → no time display
              return '';
            }
          }
        }
        d.setUTCHours(hours, minutes, 0, 0);
        const matchUtc = d.getTime(); // epoch timestamp for countdown
        
        // If match time has passed and it's today, show LIVE
        if (isToday && Date.now() >= matchUtc) return formatLiveNow(day, time);
        
        d.setUTCMinutes(d.getUTCMinutes() + 345); // +5:45 for NPT display
        
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const dayNum = d.getUTCDate();
        const month = months[d.getUTCMonth()];
        const dateStr = dayNum + ' ' + month;
        
        const nptHours = d.getUTCHours();
        const nptMinutes = d.getUTCMinutes();
        const nptAmpm = nptHours >= 12 ? 'PM' : 'AM';
        const displayHours = nptHours % 12 || 12;
        const displayMinutes = String(nptMinutes).padStart(2, '0');
        
        if (isToday || isTomorrow) {
          const label = isToday ? 'Starts in ' : '';
          return `<span class="cd-wrapper">${label ? '<span class="cd-label">Starts in </span>' : ''}<span class="countdown-timer" data-utc="${matchUtc}"></span></span>`;
        }
        return `${displayHours}:${displayMinutes} ${nptAmpm} NPT • ${dateStr}`;
      } catch (e) {
        return raw;
      }
    }

    let leagueLookup = null;

    function initLeagueLookup(events) {
      leagueLookup = {};
      for (const e of events) {
        const teams = (e.teams || []).map(t => t.toLowerCase().trim()).filter(Boolean);
        if (teams.length >= 2 && e.league) {
          const key = teams.slice().sort().join('::');
          if (!leagueLookup[key]) leagueLookup[key] = e.league;
        }
      }
    }

    function enrichLeague(title, league) {
      const l = (league || '').trim().toLowerCase();
      const t = (title || '').toLowerCase();
      if (leagueLookup) {
        const parsed = parseMatchTitle(title);
        if (parsed.isVs) {
          const t1 = parsed.team1.toLowerCase().trim();
          const t2 = parsed.team2.toLowerCase().trim();
          const key = [t1, t2].sort().join('::');
          if (leagueLookup[key]) return leagueLookup[key];
          for (const [k, v] of Object.entries(leagueLookup)) {
            const teams = k.split('::');
            if ((teams.some(t => t1.includes(t) || t.includes(t1))) && (teams.some(t => t2.includes(t) || t.includes(t2)))) {
              return v;
            }
          }
        }
      }
      if (t.includes('test')) return 'International Test Match';
      const iccLeague2 = ['nepal', 'usa', 'united states', 'oman', 'namibia', 'netherlands', 'scotland', 'uae', 'canada', 'papua new guinea', 'png'];
      if (iccLeague2.filter(n => t.includes(n)).length >= 2) return 'ICC CWC League 2';
      if (!l || l === 'cricket' || l === 'cricket match') return league || 'Cricket Match';
      return league;
    }

    function canShowLive(match) {
      if (!match.isLive) return false;
      const day = (match.day||'').trim();
      if (day === 'Today' || day.includes('Today') || day === 'Tomorrow' || day.includes('Tomorrow')) return true;
      const dateParts = day.match(/(\d+)-(\d+)-(\d+)/);
      if (dateParts) {
        const d = new Date(Date.UTC(dateParts[3], dateParts[2] - 1, dateParts[1]));
        const now = new Date();
        if (d.getUTCFullYear() === now.getUTCFullYear() && d.getUTCMonth() === now.getUTCMonth() && d.getUTCDate() === now.getUTCDate()) return true;
        // Past dates with isLive should not show badge
        return false;
      }
      // If day is empty or unparseable, trust isLive flag
      return true;
    }

    function formatISOToNPT(isoStr) {
      if (!isoStr) return '';
      try {
        const d = new Date(isoStr);
        if (isNaN(d.getTime())) return '';
        const npt = new Date(d.getTime() + 345 * 60000);
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const h = npt.getUTCHours();
        const m = npt.getUTCMinutes();
        const ampm = h >= 12 ? 'PM' : 'AM';
        const hh = h % 12 || 12;
        const mm = String(m).padStart(2, '0');
        const date = npt.getUTCDate() + ' ' + months[npt.getUTCMonth()];
        return `${hh}:${mm} ${ampm} NPT • ${date}`;
      } catch (e) { return ''; }
    }

    async function openFootyEvent(event) {
      const channels = event.channels || [];
      if (channels.length === 0) {
        alert('No streams available yet. Try closer to match time.');
        return;
      }

      const modal = document.getElementById('streamModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');

      modalTitle.textContent = event.title;

      // Resolve embed channels to HLS server-side with referer
      let resolved = channels;
      try {
        resolved = await Promise.all(channels.map(async (s) => {
          if (s.type === 'embed') {
            let url = '/api/footystream?action=resolve&channelUrl=' + encodeURIComponent(s.url);
            if (s.referer) url += '&referer=' + encodeURIComponent(s.referer);
            if (s.ua) url += '&ua=' + encodeURIComponent(s.ua);
            const r = await fetch(url);
            const d = await r.json();
            if (d.success && d.type === 'hls') {
              return { ...s, url: d.url, type: 'hls' };
            }
            if (d.success && d.type === 'embed' && d.url !== s.url) {
              return { ...s, url: d.url, type: 'embed' };
            }
          }
          return s;
        }));
      } catch (e) {}

      const hasHls = resolved.some(s => s.type === 'hls' || s.url.includes('.m3u8'));
      if (!hasHls) {
        modalBody.innerHTML = `<div class="match-detail"><div class="vs">⏳ Not Live Yet</div><div style="text-align:center;color:#888;margin-top:8px;font-size:14px;">Stream will appear when the event goes live</div></div>`;
        modal.classList.add('show');
        return;
      }
      let html = '';
      resolved.forEach((s, i) => {
        const chType = s.type || 'embed';
        const emoji = chType === 'hls' ? ' 🎬' : ' 📺';
        const lang = s.language ? ` (${s.language})` : '';
        html += `<div class="stream-link" onclick="playFootyStream('${esc(s.url)}', '${esc(s.name + lang)}', '${esc(chType)}')">
          <div class="name">${s.name}</div>
          <div class="quality">${s.language || 'Stream ' + (i + 1)}${emoji}</div>
        </div>`;
      });
      modalBody.innerHTML = html;
      modal.classList.add('show');
    }

    function playFootyStream(url, name, type) {
      const modal = document.getElementById('streamModal');
      if (modal) modal.classList.remove('show');

      // Clean up previous player
      let iframe = document.getElementById('yonoFrame');
      if (iframe) { iframe.parentNode.removeChild(iframe); iframe = null; }
      const player = document.getElementById('player');
      if (hls) { hls.destroy(); hls = null; }
      player.style.display = 'none';

      // If it's a direct HLS stream, use our player
      if (type === 'hls' || type === 'direct' || url.includes('.m3u8')) {
        showFloatPlayer(url, name);
        nowPlayingEl.innerHTML = name;
        return;
      }

      // If embed, try inline iframe first; add pop-out button
      if (type === 'embed') {
        let ef = document.getElementById('yonoFrame');
        if (!ef) {
          ef = document.createElement('iframe');
          ef.id = 'yonoFrame';
          ef.style.cssText = 'width:100%;height:calc(100vh - 120px);border:none;';
          ef.setAttribute('referrerpolicy', 'no-referrer');
          document.querySelector('.video-wrap').appendChild(ef);
        }
        player.style.display = 'none';
        ef.style.display = 'block';
        // Proxy bhalocast pages through our server with correct referer
        if (url.includes('bhalocast.pro')) {
          ef.src = '/api/footystream?action=proxy&channelUrl=' + encodeURIComponent(url) + '&referer=' + encodeURIComponent('https://playeraio.top/');
        } else {
          ef.src = url;
        }
        nowPlayingEl.innerHTML = name + ' <button onclick="window.open(\'' + esc(url) + "', '_blank');" + '" style="background:#4a9eff;border:none;color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;margin-left:8px;font-size:12px;">↗ External</button>';
        return;
      }

    }

    async function openStreamRKOMatch(event) {
      const streamUrl = `/api/streamfree-direct?category=${encodeURIComponent(event.category)}&key=${encodeURIComponent(event.streamKey)}`;
      const title = event.name;

      let iframe = document.getElementById('yonoFrame');
      if (iframe) { iframe.parentNode.removeChild(iframe); iframe = null; }

      const videoPlayer = document.getElementById('player');
      if (hls) { hls.destroy(); hls = null; }
      videoPlayer.pause();
      videoPlayer.removeAttribute('src');
      videoPlayer.style.display = 'none';

      nowPlayingEl.innerHTML = `<span style="color:#4a9eff;">Stream RKO:</span> ${title}`;

      // Auto-launch native float player (switches stream if already playing)
      popOutStreamRKO(streamUrl, title);

      // Fallback: in-page Hls.js for browsers without native support
      if (!window.Android && window.location.protocol !== 'file:') {
        videoPlayer.style.display = 'block';
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          hls = new Hls({
            fragLoadingMaxRetry: 6,
            fragLoadingRetryDelay: 1000,
            manifestLoadingMaxRetry: 6,
            manifestLoadingRetryDelay: 1000,
          });
          hls.loadSource(streamUrl);
          hls.attachMedia(videoPlayer);
          hls.on(Hls.Events.MANIFEST_PARSED, function() {
            videoPlayer.play().catch(function() {});
          });
          hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
              hls.destroy();
              hls = null;
              nowPlayingEl.innerHTML = `Stream RKO failed: ${title}. <button onclick="openStreamRKOMatch(streamRKOEvents.find(e=>e.name==='${esc(title)}'))" style="background:#e67e22;border:none;color:#fff;padding:6px 12px;border-radius:4px;cursor:pointer;margin-left:8px;">Retry</button>`;
            }
          });
        } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
          videoPlayer.src = streamUrl;
          videoPlayer.play().catch(function() {});
        } else {
          nowPlayingEl.innerHTML = 'Stream RKO: HLS not supported in this browser';
        }
      }
    }

    function popOutStreamRKO(proxyUrl, title) {
      nowPlayingEl.innerHTML = `<span class="loading-spinner" style="display:inline-block;width:16px;height:16px;border-width:2px;vertical-align:middle;margin-right:8px;"></span> Connecting to ${title}...`;
      if (proxyUrl && proxyUrl.indexOf('/') === 0) {
        proxyUrl = window.location.origin + proxyUrl;
      }
      if (window.Android) {
        try {
          Android.startStreamRkoFloatingPlayer(proxyUrl, title || 'Stream RKO');
          return;
        } catch(e) {}
        try {
          window.location.href = 'rko://streamrkofloat?url=' + encodeURIComponent(proxyUrl) + '&title=' + encodeURIComponent(title || 'Stream RKO');
          return;
        } catch(e) {}
      }
      if (window.location.protocol === 'file:') {
        try {

    async function openWWEEvent(event) {
      const modal = document.getElementById('streamModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');

      modalTitle.textContent = event.title;
      modalBody.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Extracting live stream...</div>';
      modal.classList.add('show');

      try {
        const res = await fetch(`/api/watchwrestling?action=servers&eventUrl=${encodeURIComponent(event.url)}`);
        const data = await res.json();

        if (!data.success || !data.servers || data.servers.length === 0) {
          modalBody.innerHTML = `<div class="crichd-error">No live stream available for ${event.title}.</div>`;
          return;
        }

        // Auto-try each server until we find an m3u8 stream
        let resolvedServers = [];
        const embedOnlySites = ['sawlivenow.com', 'punjabeducareapp.com', 'pwrestling.com'];
        for (const server of data.servers) {
          // Skip stream resolution for embed-only sites to preserve one-time redirect tokens
          if (embedOnlySites.some(s => server.url.includes(s))) {
            resolvedServers.push({ server, stream: { url: server.url, type: 'iframe' } });
            continue;
          }
          modalBody.innerHTML = `<div class="loading"><div class="loading-spinner"></div>Resolving ${server.name}...</div>`;
          try {
            const sRes = await fetch(`/api/watchwrestling?action=stream&serverUrl=${encodeURIComponent(server.url)}&referer=${encodeURIComponent(event.url)}`);
            const sData = await sRes.json();
            if (sData.success && sData.stream && sData.stream.type === 'm3u8') {
              const valid = await validateM3U8(sData.stream.url);
              if (!valid) { resolvedServers.push({ server, stream: sData.stream }); continue; }
              let refUrl = server.url, originUrl = '';
              try { originUrl = new URL(refUrl).origin; } catch(e) {}
              const proxyUrl = `/api/hls-proxy?url=${encodeURIComponent(sData.stream.url)}&referer=${encodeURIComponent(refUrl)}&origin=${encodeURIComponent(originUrl)}`;
              if (typeof Android !== 'undefined' && typeof Android.startWWELiveFloatingPlayer !== 'undefined') {
                try { Android.startWWELiveFloatingPlayer(proxyUrl, event.title); closeModal(); return; } catch(e) {}
              }
              playCricHDStream(event.title, proxyUrl);
              closeModal();
              return;
            }
            if (sData.success && sData.stream) {
              resolvedServers.push({ server, stream: sData.stream });
            }
          } catch(e) {
            console.error('Server resolve failed:', server.name, e);
          }
        }

        // Only show direct m3u8 streams in live section, filter out embeds
        resolvedServers = resolvedServers.filter(s => s.stream.type === 'm3u8');

        // No m3u8 auto-played — prepend known direct m3u8 URLs as fallback servers
          const knownDirectStreams = [
            { name: 'Netflix Server', url: 'https://todo.loreofeldenring.site/dailymotion/live/playlist/4.m3u8' },
            { name: 'Live Streaming -livestream3', url: 'https://todo.loreofeldenring.site/dailymotion/live/playlist/1.m3u8' },
          ];
          for (const ks of knownDirectStreams) {
            if (!resolvedServers.some(s => s.server.url === ks.url)) {
              resolvedServers.unshift({ server: ks, stream: { url: ks.url, type: 'm3u8' } });
            }
          }
          if (resolvedServers.length === 0) {
            modalBody.innerHTML = `<div class="crichd-error">No live stream available for ${event.title}.</div>`;
          } else {
            let linksHtml = '<div style="margin-bottom:12px;font-size:13px;color:#888;">Available streams:</div>';
            resolvedServers.forEach(({ server, stream }) => {
            const playUrl = stream.url || server.url;
            linksHtml += `
              <div class="stream-link" onclick="playHighlightStream('${esc(server.url)}', '${esc(event.title)}', '${esc(event.url)}');closeModal();">
                <div class="name">${server.name}</div>
                <div class="quality">${stream.type === 'm3u8' ? 'HD Stream' : 'Web Player'}</div>
              </div>
            `;
          });
        modalBody.innerHTML = linksHtml;

        // Pre-fetch first server's stream URL to warm cache
        if (data.servers.length > 0) {
          const first = data.servers[0];
          fetch(`/api/crichd?action=stream&streamUrl=${encodeURIComponent(first.url)}`).catch(() => {});
        }
        }
      } catch (err) {
        modalBody.innerHTML = `<div class="crichd-error">Failed to load streams: ${err.message}</div>`;
      }
    }

    async function validateM3U8(url) {
      try {
        const res = await fetch(url, { method: 'GET', signal: AbortSignal.timeout(10000) });
        if (!res.ok) return false;
        const text = await res.text();
        return text.trim().startsWith('#EXTM3U');
      } catch(e) {
        console.error('m3u8 validate failed:', url, e);
        return false;
      }
    }

    async function playHighlightStream(serverUrl, title, referer) {
      const blockedSites = ['sawlivenow.com', 'punjabeducareapp.com', 'pwrestling.com'];
      try {
        const res = await fetch(`/api/watchwrestling?action=stream&serverUrl=${encodeURIComponent(serverUrl)}&referer=${encodeURIComponent(referer)}`);
        const data = await res.json();
        if (data.success && data.stream) {
          if (data.stream.type === 'm3u8') {
            let refUrl = serverUrl;
            let originUrl = '';
            try { originUrl = new URL(refUrl).origin; } catch(e) { originUrl = refUrl; }
            const proxyUrl = `/api/hls-proxy?url=${encodeURIComponent(data.stream.url)}&referer=${encodeURIComponent(refUrl)}&origin=${encodeURIComponent(originUrl)}`;
            playCricHDStream(title, proxyUrl);
            return;
          }
          // For embed-only sites, try to capture the m3u8 URL from the proxied embed
          if (blockedSites.some(s => data.stream.url.includes(s) || serverUrl.includes(s))) {
            tryCaptureFromEmbed(serverUrl, title, referer);
            return;
          }
          playEmbedInMainPlayer(data.stream.url, title, referer);
          return;
        }
      } catch(e) {
        console.error('playHighlightStream failed:', e);
      }
      // Fallback: if blocked site, try capture; otherwise plain embed
      if (blockedSites.some(s => serverUrl.includes(s))) {
        tryCaptureFromEmbed(serverUrl, title, referer);
      } else {
        playEmbedInMainPlayer(serverUrl, title, referer);
      }
    }

    async function tryCaptureFromEmbed(serverUrl, title, referer) {
      const proxyUrl = '/api/watchwrestling?action=proxy-embed&url=' + encodeURIComponent(serverUrl) + '&referer=' + encodeURIComponent(referer || serverUrl);
      // Create hidden iframe to load the embed and capture m3u8 URL
      let captIframe = document.createElement('iframe');
      captIframe.style.cssText = 'width:1px;height:1px;position:absolute;left:-9999px;top:-9999px;';
      captIframe.id = 'captureIframe';
      document.body.appendChild(captIframe);
      nowPlayingEl.innerHTML = `<div class="loading-spinner" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:8px;"></div> Loading: ${title}`;
      captIframe.src = proxyUrl;
      // Poll for captured m3u8 URL
      let polled = false;
      for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 500));
        try {
          const captured = captIframe.contentWindow && captIframe.contentWindow._capturedM3u8;
          if (captured && captured.includes('.m3u8')) {
            polled = true;
            captIframe.parentNode.removeChild(captIframe);
            playCricHDStream(title, captured);
            return;
          }
        } catch(e) {}
      }
      // Timeout — remove hidden iframe, show as visible embed
      if (!polled) {
        captIframe.parentNode.removeChild(captIframe);
        playEmbedInMainPlayer(serverUrl, title, referer);
      }
    }

      // Use proxy-embed for sites that block iframe embedding
      const blockedSites = ['sawlivenow.com', 'punjabeducareapp.com', 'pwrestling.com'];

        iframe.src = '/api/watchwrestling?action=proxy-embed&url=' + encodeURIComponent(url) + '&referer=' + encodeURIComponent(referer || url);
      } else {
        iframe.src = url;
      }
      nowPlayingEl.innerHTML = `Playing: ${title} (Highlight)`;
    }

          const mt1 = (mParsed.team1 || '').toLowerCase();
          const mt2 = (mParsed.team2 || '').toLowerCase();

      });

    function playCricHDStream(title, streamUrl) {
      currentStreamUrl = streamUrl;
      currentStreamTitle = title;
      let iframe = document.getElementById('yonoFrame');
      if (iframe) { iframe.parentNode.removeChild(iframe); iframe = null; }

      const videoPlayer = document.getElementById('player');
      if (hls) { hls.destroy(); hls = null; }
      videoPlayer.pause();
      videoPlayer.removeAttribute('src');
      videoPlayer.style.display = 'block';

      if (streamUrl.includes('.m3u8') && typeof Hls !== 'undefined' && Hls.isSupported()) {
        hls = new Hls({
          fragLoadingMaxRetry: 6,
          fragLoadingRetryDelay: 1000,
          manifestLoadingMaxRetry: 6,
          manifestLoadingRetryDelay: 1000,
          xhrSetup: function(xhr) {
            xhr.timeout = 10000;
          }
        });
        hls.loadSource(streamUrl);
        hls.attachMedia(videoPlayer);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
          videoPlayer.play().catch(function() {});
        });
        hls.on(Hls.Events.ERROR, function(event, data) {
          if (data.fatal) {
            hls.destroy();
            hls = null;
            console.error('HLS Error:', data.type, data.details, data.url);
            nowPlayingEl.innerHTML = `Stream failed: ${title}. <button onclick="retryStream()" style="background:#e67e22;border:none;color:#fff;padding:6px 12px;border-radius:4px;cursor:pointer;margin-left:8px;">🔄 Retry</button>`;
          }
        });
      } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
        videoPlayer.src = streamUrl;
        videoPlayer.addEventListener('loadedmetadata', function onMeta() {
          videoPlayer.removeEventListener('loadedmetadata', onMeta);
          videoPlayer.play().catch(function() {});
        });
      }

      nowPlayingEl.innerHTML = `Playing: ${title} <button onclick="popOutCricHD('${esc(streamUrl)}', '${esc(title)}')" style="background:#4a9eff;border:none;color:#fff;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:8px;">Pop Out 📺</button>`;
    }

    async function playCricHDMatch(match, divEl) {
      document.querySelectorAll('.channel').forEach(c => c.classList.remove('playing'));
      if (divEl) divEl.classList.add('playing');

      nowPlayingEl.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;display:inline-block;vertical-align:middle;margin-right:8px;"></div> Loading: ' + match.title;

      try {
        const res = await fetch(`/api/crichd?action=servers&matchUrl=${encodeURIComponent(match.pageUrl || match.url)}`);
        const data = await res.json();

        if (!data.success || !data.servers || data.servers.length === 0) {
          nowPlayingEl.innerHTML = 'No streams available for: ' + match.title;
          return;
        }

        let iframe = document.getElementById('yonoFrame');
        if (iframe) { iframe.parentNode.removeChild(iframe); iframe = null; }

        const streamRes = await fetch(`/api/crichd?action=stream&streamUrl=${encodeURIComponent(data.servers[0].url)}`);
        const streamData = await streamRes.json();

        if (streamData.success && streamData.stream) {
          playCricHDStream(match.title + ' (' + data.servers[0].name + ')', streamData.stream.url);

    async function switchCricHDServer(url, title) {
      const streamRes = await fetch(`/api/crichd?action=stream&streamUrl=${encodeURIComponent(url)}`);

      if (streamData.success && streamData.stream) {
        playCricHDStream(title, streamData.stream.url);
        nowPlayingEl.innerHTML = `Playing: ${title} <button onclick="popOutCricHD('${esc(streamData.stream.url)}', '${esc(title)}')" style="background:#4a9eff;border:none;color:#fff;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:8px;">Pop Out 📺</button>`;

      }
    }

      nowPlayingEl.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:6px;"></div> Loading: ' + title;
      const streamRes = await fetch(`/api/crichd?action=stream&streamUrl=${encodeURIComponent(url)}`);
      const streamData = await streamRes.json();

      if (streamData.success && streamData.stream) {
        if (window.Android) {
          // On Android, send directly to floating player
          try {
            Android.startStreamRkoFloatingPlayer(streamData.stream.url, title);
          } catch(e) {
            window.location.href = 'rko://streamrkofloat?url=' + encodeURIComponent(streamData.stream.url) + '&title=' + encodeURIComponent(title);
          }
        } else {
          playCricHDStream(title, streamData.stream.url);
        }
      } else {
        nowPlayingEl.innerHTML = 'Failed to load: ' + title;
      }
    }

    // Parse M3U
    function parseM3U(text) {
      const channels = [];
      const lines = text.split(/\r?\n/);
      let info = null;

      for (const line of lines) {
        const t = line.trim();
        
        if (t.startsWith('#EXTINF:') || t.startsWith('#EXTINF:-')) {
          const parts = t.split(',');
          const name = parts[1]?.trim() || 'Unknown';
          const country = ((t.match(/tvg-country="([^"]*)"/) || [])[1] || '').toUpperCase();
          const logo = (t.match(/tvg-logo="([^"]*)"/) || [])[1] || '';
          const group = (t.match(/group-title="([^"]*)"/) || [])[1] || '';
          info = { name, country, logo, group };
        }
        else if (info && !t.startsWith('#') && (t.includes('.m3u8') || t.includes('.m3u'))) {
          // Generate logo URL if not provided
          let logoUrl = info.logo;
          if (!logoUrl || !logoUrl.startsWith('http')) {
            const slug = info.name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
            logoUrl = `https://raw.githubusercontent.com/iptv-org/logos/master/${info.country.toLowerCase()}/${slug}.png`;
          }
          channels.push({
            ...info,
            url: t,
            logo: logoUrl
          });
          info = null;
        }
      }
      return channels;
    }

        'movies': /movies|cinema|film|star|movie|bolawood|hollywood|bwood| Bolly/i,
        'music': /music|mtun|hits|MTV|viva|channel.*v|song/i,
        'entertainment': /entertainment|reality|tv|show|comedy|drama|star|life|zee|sony|colors/i,
        'documentary': /documentary|discovery|national|geo|history|animal|planet/i
      };
      
      const filter = filters[activeCategory];
      if (!filter) return channels;
      
      return channels.filter(ch => 
        filter.test(ch.name) || filter.test(ch.group)
      );
    }

    // Render channels
    function renderChannels() {
      let filtered = allChannels;
      
      // Category filter
      filtered = filterCategory(filtered);
      
      // Search filter
      const search = searchInput.value.toLowerCase();
      if (search) {
        filtered = filtered.filter(ch => 
          (ch.name || '').toLowerCase().includes(search) ||
          (ch.country || '').toLowerCase().includes(search) ||
          (ch.group || '').toLowerCase().includes(search)
        );
      }

      channelListEl.innerHTML = '';
      
      if (filtered.length === 0) {
        channelListEl.innerHTML = '<div class="loading">No channels found</div>';
        return;
      }

      filtered.forEach(ch => {
        const chUrl = ch.urls ? ch.urls[0] : ch.url;
        const currentUrl = currentChannel ? (currentChannel.urls ? currentChannel.urls[0] : currentChannel.url) : null;
        const div = document.createElement('div');
        div.className = 'channel' + (currentUrl === chUrl ? ' playing' : '');
        
        const logoDiv = document.createElement('div');
        logoDiv.className = 'logo';
        
        if (ch.logo && ch.logo.startsWith('http')) {
          const img = document.createElement('img');

          img.onerror = () => {
            logoDiv.innerHTML = `<span>${ch.logo}</span>`;
          };
          logoDiv.appendChild(img);
        } else if (ch.logo) {
          // Emoji logo
          logoDiv.innerHTML = `<span style="font-size:24px">${ch.logo}</span>`;
        } else {
          logoDiv.innerHTML = `<span>${flags[ch.country] || (ch.name || '?')[0]}</span>`;
        }
        
        const infoDiv = document.createElement('div');
        infoDiv.className = 'ch-info';
        infoDiv.innerHTML = `<div class="ch-name">${ch.name || 'Unknown'}</div><div class="ch-country">${countries[ch.country] || ch.country || ch.group || ''}</div>`;
        
        div.appendChild(logoDiv);
        div.appendChild(infoDiv);
        div.onclick = () => playChannel(ch);
        // Prefetch on hover (300ms delay)
        let hoverTimer;
        div.onmouseenter = () => {
          clearTimeout(hoverTimer);
          hoverTimer = setTimeout(() => {
            if (ch.urls || ch.url) {
              prefetchUrl(ch.urls ? ch.urls[0] : ch.url);
            }
          }, 300);
        };
        div.onmouseleave = () => clearTimeout(hoverTimer);
        channelListEl.appendChild(div);
      });
    }

    // Get stream URL

// Play channel - fast switch with multiple URLs
    let urlIndex = 0;
    let autoSwitchTimer = null;
    let playbackStarted = false;
    function getChannelUrls(ch) {
      return (ch.urls && ch.urls.length > 0) ? ch.urls : [ch.url, ch.fallback].filter(Boolean);
    }
    function clearAutoSwitchTimer() {
      if (autoSwitchTimer) { clearTimeout(autoSwitchTimer); autoSwitchTimer = null; }
    }
    function startAutoSwitch(ch) {
      clearAutoSwitchTimer();
      playbackStarted = false;
      autoSwitchTimer = setTimeout(() => {
        if (!playbackStarted && currentChannel === ch) {
          const urls = getChannelUrls(ch);
          if (urlIndex < urls.length - 1) {
            console.log('Auto-switching to URL ' + (urlIndex + 2));
            urlIndex++;
            playChannel(ch, urlIndex);
          } else {
            nowPlayingEl.innerHTML = `❌ All URLs failed: ${ch.name} <button onclick="retryChannel()" style="background:#e67e22;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;margin-left:10px;">🔄 Retry</button>`;
          }
        }
      }, 6000);
    }
    function playChannel(ch, newUrlIndex = null) {
      const urls = getChannelUrls(ch);
      
      // New channel or explicit index given
      if (newUrlIndex !== null) {
        urlIndex = newUrlIndex;
      } else if (!currentChannel || currentChannel.name !== ch.name) {
        urlIndex = 0;
      }
      
      currentChannel = ch;
      
      if (urlIndex >= urls.length) urlIndex = 0;
      if (urlIndex < 0) urlIndex = 0;
      
      if (urls.length === 0) {
        nowPlayingEl.innerHTML = `❌ No URLs: ${ch.name} <button onclick="retryChannel()" style="background:#e67e22;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;margin-left:10px;">🔄 Retry</button>`;
        return;
      }
      
      const currentUrl = urls[urlIndex];
      const label = urls.length > 1 ? ` [${urlIndex + 1}/${urls.length}]` : '';
      const switchBtns = urls.length > 1 ? urls.map((u, i) => 
        `<button onclick="switchUrl(${i})" style="background:${i === urlIndex ? '#4a9eff' : '#666'};border:none;color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:5px;">${i + 1}</button>`
      ).join('') : '';
      
      nowPlayingEl.innerHTML = `Playing: ${ch.name}${label} <button onclick="togglePiP()" style="background:#4a9eff;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;margin-left:10px;">PiP</button>${switchBtns} <button onclick="retryChannel()" style="background:#666;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;margin-left:5px;">🔄</button> <button onclick="toggleMiniPlayer()" style="background:#666;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;margin-left:5px;">Mini</button>`;

      // Save stream URL
      if (typeof Android !== 'undefined') { try { Android.onVideoPlaying(currentUrl); } catch(e) {} }
      try { localStorage.setItem('lastStreamUrl', currentUrl); } catch(e) {}
      
      // Fast cleanup
      if (hls) { hls.stopLoad(); hls.destroy(); hls = null; }
      player.pause();
      player.removeAttribute('src');
      player.load();
      
      // Hide iframe
      let iframe = document.getElementById('yonoFrame');
      if (iframe) { iframe.src = 'about:blank'; iframe.style.display = 'none'; }
      player.style.display = 'block';
      
      // Mark playback when it starts
      player.onplaying = () => { playbackStarted = true; clearAutoSwitchTimer(); };
      player.oncanplay = () => { playbackStarted = true; clearAutoSwitchTimer(); };
      
      // Start 6s auto-switch timer
      startAutoSwitch(ch);
      
      // Check if HLS.js is needed
      if (currentUrl.includes('.m3u8')) {
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          if (hls) { hls.destroy(); hls = null; }
          hls = new Hls({
            fragLoadingMaxRetry: 3,
            manifestLoadingMaxRetry: 3,
            startFragPrefetch: true,
            lowLatencyMode: false,
            backBufferLength: 30
          });
          hls.loadSource(currentUrl);
          hls.attachMedia(player);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            playbackStarted = true;
            clearAutoSwitchTimer();
            player.play().catch(() => {});
          });
          hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
              playbackStarted = false;
              if (urlIndex < urls.length - 1) {
                urlIndex++;
                playChannel(ch, urlIndex);
              } else {
                clearAutoSwitchTimer();
                nowPlayingEl.innerHTML = `❌ All URLs failed: ${ch.name} <button onclick="retryChannel()" style="background:#e67e22;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;margin-left:10px;">🔄 Retry</button>`;
              }
            }
          });
          player.play().catch(() => {});
        } else {
          player.style.display = 'none';
          if (!iframe) {
            iframe = document.createElement('iframe');
            iframe.id = 'yonoFrame';
            iframe.style.cssText = 'width:100%;height:calc(100vh - 120px);border:none;';
            iframe.setAttribute('allowfullscreen', '');
            document.querySelector('.video-wrap').appendChild(iframe);
          }
          iframe.onload = () => { playbackStarted = true; clearAutoSwitchTimer(); };
          iframe.src = currentUrl;
          iframe.style.display = 'block';
        }
      } else if (currentUrl.includes('.ts') || (currentUrl.includes('/live/') && currentUrl.includes('?'))) {
        player.style.display = 'none';
        if (!iframe) {
          iframe = document.createElement('iframe');
          iframe.id = 'yonoFrame';
          iframe.style.cssText = 'width:100%;height:calc(100vh - 120px);border:none;';
          iframe.setAttribute('allowfullscreen', '');
          document.querySelector('.video-wrap').appendChild(iframe);
        }
        iframe.onload = () => { playbackStarted = true; clearAutoSwitchTimer(); };
        iframe.src = currentUrl;
        iframe.style.display = 'block';
      } else {
        player.src = currentUrl;
        player.play().catch(() => {});
      }
    }
    
    function switchUrl(idx) {
      if (!currentChannel) return;
      clearAutoSwitchTimer();
      playbackStarted = false;
      urlIndex = idx;
      playChannel(currentChannel, urlIndex);
    }
    
    function retryChannel() {
      if (!currentChannel) return;
      clearAutoSwitchTimer();
      playbackStarted = false;
      urlIndex = 0;
      playChannel(currentChannel, 0);
    }
    
// Picture-in-Picture (toggle)
    async function togglePiP() {
      if (document.pictureInPictureElement) {
        document.exitPictureInPicture();
      } else if (player.src || player.currentSrc) {
        try {
          player.autoPictureInPicture = true;
          await player.requestPictureInPicture();
        } catch(e) {
          pipIplstreams();
        }
      }
    }
    
    // Mini player mode
    let miniMode = false;
    function toggleMiniPlayer() {
      miniMode = !miniMode;
      const videoWrap = document.querySelector('.video-wrap');
      if (miniMode) {
        videoWrap.style.cssText = 'position:fixed;bottom:20px;right:20px;width:320px;height:180px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.5);border-radius:12px;overflow:hidden;';
      } else {
        videoWrap.style.cssText = '';
      }

    // Retry all URLs from start
    function retryChannel() {

    }
    
    // Channel info overlay
    function showChannelInfo() {
      const wrap = document.querySelector('.video-wrap');

        info.id = 'chInfo';

        wrap.appendChild(info);

      info.style.display = 'block';

    }
    player.addEventListener('loadedmetadata', showChannelInfo);
    
    // Setup MediaSession for auto-PiP on background
    if ('mediaSession' in navigator) {
      navigator.mediaSession.setActionHandler('enterpictureinpicture', () => {
        if (player.src || player.currentSrc) {
          player.requestPictureInPicture();
        }
      });
    }
    
    // Visibility change for auto-PiP
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && (player.src || player.currentSrc) && !document.pictureInPictureElement) {

          player.autoPictureInPicture = true;
          player.requestPictureInPicture();
        } catch(e) {}
      }
    });
    
    // Load playlist
    async function loadPlaylist(urlOverride) {
      const url = urlOverride || playlistUrlInput.value.trim();
      if (!url) {
        channelListEl.innerHTML = '<div class="loading" style="color:#ff0">⚠️ Select a source from the dropdown or paste an M3U URL above</div>';
        return;
      }
      
      // YonoTV - direct iframe, no playlist to fetch
      if (url.includes('yonotv.pages.dev')) {
        allChannels = [{ name: 'YonoTV Live', url: url, group: 'Live' }];
        renderChannels();
        return;
      }
      
      channelListEl.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading channels...</div>';
      
      try {
        let fetchUrl = url;
        // Check if it's a direct m3u8 URL - play directly
        if (url.endsWith('.m3u8') && (url.startsWith('http://') || url.includes('.'))) {
          // Direct m3u8 - play directly without fetching playlist
          allChannels = [{ name: 'Live Stream', url: url, group: 'Live', logo: '' }];
          renderChannels();
          return;
        }
        
        // Use CORS proxy for other URLs
        if (!url.includes(window.location.host) && !url.includes('localhost')) {
          fetchUrl = url;
        }
        
        const response = await fetch(fetchUrl);
        if (!response.ok) throw new Error('Failed to fetch: ' + response.status);
        
        const text = await response.text();
        if (!text || text.length < 100) throw new Error('Empty or invalid response');
        
        // Check if it's a direct HLS stream (live stream, not a channel list)
        if (text.includes('#EXT-X-VERSION') || text.includes('#EXT-X-TARGETDURATION') || (!text.includes('#EXTINF:') && text.includes('.ts'))) {
          // Direct HLS stream - play directly
          allChannels = [{ name: 'Live Stream', url: url, group: 'Live', logo: '' }];
          renderChannels();
          return;
        }
        
        allChannels = parseM3U(text);
        
        if (allChannels.length === 0) {
          channelListEl.innerHTML = '<div class="loading">No channels found in playlist</div>';
          return;
        }
        
        // Sort by name
        allChannels.sort((a, b) => a.name.localeCompare(b.name));
        
        renderChannels();
      } catch (error) {
        console.error('Error:', error);
        channelListEl.innerHTML = `<div class="loading" style="color:#f55">Error: ${error.message}<br><br>Tip: Check console for details</div>`;
      }
    }

    // Debounced search
    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(renderChannels, 150);
    });
    
    playlistUrlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadPlaylist();
    });
    
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeCategory = chip.dataset.cat;
        renderChannels();
      });

    // Auto-load default playlist
    // Countdown tick for today's matches
    function tickCountdowns() {
      document.querySelectorAll('.countdown-timer').forEach(el => {
        const utc = parseInt(el.getAttribute('data-utc'));
        if (!utc) { el.textContent = ''; return; }
        const diff = utc - Date.now();
        if (diff <= 0) {
          // Replace countdown with live elapsed timer
          const parent = el.closest('.cd-wrapper');
          if (parent) parent.outerHTML = `<span class="live-elapsed" data-utc="${utc}"></span>`;
          else el.outerHTML = `<span class="live-elapsed" data-utc="${utc}"></span>`;
          return;
        }
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        if (h > 0) el.textContent = `${h}h ${m}m ${s}s`;
        else el.textContent = `${m}m ${s}s`;
      });
    }
    setInterval(tickCountdowns, 1000);

    function tickLiveElapsed() {
      document.querySelectorAll('.live-elapsed').forEach(el => {
        const utc = parseInt(el.getAttribute('data-utc'));
        if (!utc) return;
        const elapsed = Math.floor((Date.now() - utc) / 1000);
        if (elapsed < 1) { el.textContent = ''; return; }
        const h = Math.floor(elapsed / 3600);
        const m = Math.floor((elapsed % 3600) / 60);
        const s = elapsed % 60;
        if (h > 0) el.textContent = `${h}h ${m}m ${s}s ago`;
        else el.textContent = `${m}m ${s}s ago`;
      });
    }
    setInterval(tickLiveElapsed, 1000);

    window.addEventListener('DOMContentLoaded', () => {
      try {

        switchSource('crichd');

        ['/api/hls-proxy?url=', '/api/crichd', '/api/live-channels', '/api/streamfree', '/api/footystream', '/api/crichd-proxy?url='].forEach(p => fetch(p).catch(() => {}));
      } catch (e) {
        console.error('Auto-load error:', e);
        channelListEl.innerHTML = '<div class="loading" style="color:#f55">Error: ' + e.message + '</div>';
      }
    });
    
    // Floating Player Functions
    let currentFloatUrl = '';
    let isFloatVisible = false;
    let floatHls = null;
    let floatMuted = false;
    
    function toggleFloatPlayer() {
      if (currentFloatUrl) {
        showFloatPlayer(currentFloatUrl, document.getElementById('floatTitle').textContent || 'Stream');
      }
    }
    
    function showFloatPlayer(url, title, keepControls) {
      if (url.indexOf('blob:') === 0) {
        var video = document.querySelector('video');
        if (video && video.currentSrc && video.currentSrc.indexOf('blob:') !== 0) {
          url = video.currentSrc;
        } else if (video && video.src && video.src.indexOf('blob:') !== 0) {
          url = video.src;
        }
      }
      if (window.location.protocol === 'file:' || window.Android) {
        try {
          var encoded = encodeURIComponent(url);
          var encTitle = encodeURIComponent(title || 'Stream');
          window.location.href = 'rko://floating?url=' + encoded + '&title=' + encTitle;
          return;
        } catch(e) {}
      }
      currentFloatUrl = url;
      isFloatVisible = true;
      const floatPlayer = document.getElementById('floatPlayer');
      const floatIframe = document.getElementById('floatIframe');
      const floatVideo = document.getElementById('floatVideo');
      const floatTitle = document.getElementById('floatTitle');
      const toggleBtn = document.getElementById('floatToggleBtn');
      
      toggleBtn.style.display = 'none';
      floatPlayer.style.display = 'block';
      floatPlayer.classList.remove('collapsed');
      floatTitle.textContent = title || 'Stream';
      
      // Position external close button at top-right of float player
      var floatCloseBtn = document.getElementById('floatCloseBtn');
      floatCloseBtn.style.display = 'flex';
      var rect = floatPlayer.getBoundingClientRect();
      floatCloseBtn.style.top = (rect.top - 12) + 'px';
      floatCloseBtn.style.left = (rect.right - 16) + 'px';
      // Re-position on resize/move
      floatPlayer._posInterval = setInterval(function() {
        var r = floatPlayer.getBoundingClientRect();
        floatCloseBtn.style.top = (r.top - 12) + 'px';
        floatCloseBtn.style.left = (r.right - 16) + 'px';
      }, 200);
      
      // Setup drag handle
      var dragHandle = document.getElementById('floatDragHandle');
      var resizeHandle = document.getElementById('floatResizeHandle');
      var dragData = {};
      dragHandle.onmousedown = dragHandle.ontouchstart = function(e) {
        e.preventDefault();
        var touch = e.touches ? e.touches[0] : e;
        dragData.initialX = floatPlayer.offsetLeft;
        dragData.initialY = floatPlayer.offsetTop;
        dragData.touchX = touch.clientX;
        dragData.touchY = touch.clientY;
        function onMove(ev) {
          var t = ev.touches ? ev.touches[0] : ev;
          floatPlayer.style.left = (dragData.initialX + t.clientX - dragData.touchX) + 'px';
          floatPlayer.style.top = (dragData.initialY + t.clientY - dragData.touchY) + 'px';
          floatPlayer.style.right = 'auto';
          floatPlayer.style.bottom = 'auto';
        }
        function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onUp); }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchmove', onMove, {passive:true});
        document.addEventListener('touchend', onUp);
      };
      // Setup resize handle
      var resizeData = {};
      resizeHandle.onmousedown = resizeHandle.ontouchstart = function(e) {
        e.preventDefault();
        var touch = e.touches ? e.touches[0] : e;
        resizeData.initialW = floatPlayer.offsetWidth;
        resizeData.initialH = floatPlayer.offsetHeight;
        resizeData.touchX = touch.clientX;
        resizeData.touchY = touch.clientY;
        function onMove(ev) {
          var t = ev.touches ? ev.touches[0] : ev;
          var w = Math.max(280, resizeData.initialW + t.clientX - resizeData.touchX);
          var h = Math.max(200, resizeData.initialH + t.clientY - resizeData.touchY);
          floatPlayer.style.width = w + 'px';
          floatPlayer.style.height = h + 'px';
        }
        function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onUp); }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchmove', onMove, {passive:true});
        document.addEventListener('touchend', onUp);
      };
      
      if (keepControls) {
        floatPlayer.classList.add('keep-controls');
        floatPlayer.classList.remove('no-controls');
      } else {
        floatPlayer.classList.remove('keep-controls');
        floatPlayer.onmouseenter = function() { floatPlayer.classList.remove('no-controls'); };
        floatPlayer.onmouseleave = function() { floatPlayer.classList.add('no-controls'); };
      }
      
      if (url.includes('.mp4')) {
        floatIframe.style.display = 'none';
        floatVideo.style.display = 'block';
        if (floatHls) { floatHls.destroy(); floatHls = null; }
        floatVideo.pause();
        floatVideo.removeAttribute('src');
        floatVideo.load();
        floatVideo.style.width = '100%';
        floatVideo.style.height = '100%';
        floatVideo.crossOrigin = 'anonymous';
        floatVideo.src = url;
        floatVideo.play().catch(function(e) {
          console.log('ICC MP4 play error', e);
        });
        floatVideo.onerror = function() {
          nowPlayingEl.innerHTML = '<span style="color:#ff6b6b;">⚠ Playback error. <a href="' + esc(url) + '" target="_blank" style="color:#4a9eff;" rel="noopener">Open in browser</a></span>';
        };
        floatVideo.addEventListener('loadedmetadata', function() {
          if (!keepControls) {
            setTimeout(function() { floatPlayer.classList.add('no-controls'); }, 3000);
          }
        }, { once: true });
      } else if (url.includes('.m3u8') || url.startsWith('blob:') || url.includes('/api/streamfree-direct') || url.includes('/api/hls-proxy') || url.includes('/api/crichd-proxy')) {
        floatIframe.style.display = 'none';
        floatVideo.style.display = 'block';
        if (floatHls) { floatHls.destroy(); floatHls = null; }
        floatVideo.pause();
        floatVideo.removeAttribute('src');
        floatVideo.load();
        
        var canNativeHls = floatVideo.canPlayType('application/vnd.apple.mpegurl');
        
        // For direct CDN URLs (not via proxy), try native playback first (no CORS issues on mobile)
        if (url.startsWith('http') && !url.includes('/api/') && canNativeHls) {
          floatVideo.crossOrigin = 'anonymous';
          floatVideo.src = url;
          floatVideo.onerror = function() {
            nowPlayingEl.innerHTML = 'Playback error - stream may be unavailable';
          };
          floatVideo.addEventListener('loadedmetadata', function() {
            floatVideo.play().catch(function() {});
            if (!keepControls) {
              setTimeout(function() { floatPlayer.classList.add('no-controls'); }, 3000);
            }
          });
        } else if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          floatHls = new Hls({fragLoadingMaxRetry: 6, manifestLoadingMaxRetry: 6});
          floatHls.loadSource(url);
          floatHls.attachMedia(floatVideo);
          floatHls.on(Hls.Events.MANIFEST_PARSED, function() {
            floatVideo.play().catch(function() {});
            if (!keepControls) {
              setTimeout(function() { floatPlayer.classList.add('no-controls'); }, 3000);
            }
          });
          floatHls.on(Hls.Events.ERROR, function(event, data) {
            console.error('HLS error:', data);
            if (data.fatal) {
              var errMsg = 'HLS: ' + (data.details || 'unknown');
              if (data.reason) errMsg += ' - ' + data.reason;
              if (data.response) errMsg += ' [' + data.response.code + ']';
              nowPlayingEl.innerHTML = errMsg;
            }
          });
        } else if (canNativeHls) {
          floatVideo.src = url;
          floatVideo.addEventListener('loadedmetadata', function() {
            floatVideo.play().catch(function() {});
            if (!keepControls) {
              setTimeout(function() { floatPlayer.classList.add('no-controls'); }, 3000);
            }
          });
        }
      } else {
        floatVideo.style.display = 'none';
        floatIframe.style.display = 'block';
        floatIframe.src = url;
      }
    }
    
    function hideFloat() {
      const floatPlayer = document.getElementById('floatPlayer');
      const toggleBtn = document.getElementById('floatToggleBtn');
      const floatCloseBtn = document.getElementById('floatCloseBtn');
      floatPlayer.style.display = 'none';
      toggleBtn.style.display = 'block';
      floatCloseBtn.style.display = 'none';
      isFloatVisible = false;
      if (floatPlayer._posInterval) { clearInterval(floatPlayer._posInterval); floatPlayer._posInterval = null; }
    }
    
    function openSizeMenu() {
      var menu = document.getElementById('floatSizeMenu');
      menu.classList.toggle('show');
    }
    
    function setFloatSize(size) {
      var fp = document.getElementById('floatPlayer');
      fp.classList.remove('size-small', 'size-medium', 'size-large', 'fullscreen');
      fp.classList.add('size-' + size);
      fp.style.width = '';
      fp.style.height = '';
      document.getElementById('floatSizeMenu').classList.remove('show');
    }
    
    function toggleFullscreen() {
      var fp = document.getElementById('floatPlayer');
      var video = document.getElementById('floatVideo');
      var iframe = document.getElementById('floatIframe');
      if (fp.classList.contains('fullscreen')) {
        fp.classList.remove('fullscreen');
        fp.style.cssText = '';
        fp.classList.add('size-medium');
        exitNativeFullscreen();
      } else {
        fp.classList.remove('collapsed');
        fp.classList.add('fullscreen');
        fp.style.cssText = 'display:block;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:99999;';
        // Use native fullscreen API for proper landscape on mobile
        var el = (video && video.style.display !== 'none') ? video : (iframe && iframe.style.display === 'block' ? iframe : null);
        if (el) {
          requestNativeFullscreen(el);
        } else {
          requestNativeFullscreen(fp);
        }
      }
    }

    function requestNativeFullscreen(el) {
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function exitNativeFullscreen() {
      if (document.fullscreenElement) document.exitFullscreen();
      else if (document.webkitFullscreenElement) document.webkitExitFullscreen();
      else if (document.msFullscreenElement) document.msExitFullscreen();
    }

    // Sync CSS fullscreen class with native fullscreen changes
    document.addEventListener('fullscreenchange', syncFullscreenClass);
    document.addEventListener('webkitfullscreenchange', syncFullscreenClass);
    document.addEventListener('msfullscreenchange', syncFullscreenClass);
    function syncFullscreenClass() {
      var fp = document.getElementById('floatPlayer');
      var inFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
      if (!inFullscreen && fp.classList.contains('fullscreen')) {
        fp.classList.remove('fullscreen');
        fp.style.cssText = '';
        fp.classList.add('size-medium');
      }
    }
    
    function minimizeFloat() {
      var fp = document.getElementById('floatPlayer');
      fp.classList.toggle('collapsed');
    }
    
    function toggleFloatMute() {
      var fv = document.getElementById('floatVideo');
      var btn = document.getElementById('floatMuteBtn');
      floatMuted = !floatMuted;
      if (fv) { fv.muted = floatMuted; }
      btn.textContent = floatMuted ? '🔇' : '🔊';
    }
    
    async function floatPip() {
      var floatVideo = document.getElementById('floatVideo');
      if (floatVideo && floatVideo.style.display !== 'none' && floatVideo.src) {
        try { await floatVideo.requestPictureInPicture(); return; } catch(e) {}
      }
      if (currentFloatUrl) {
        showFloatPlayer(currentFloatUrl, document.getElementById('floatTitle').textContent || 'Stream');
      }
    }
    
    // Close size menu on outside click
    document.addEventListener('click', function(e) {
      var menu = document.getElementById('floatSizeMenu');
      if (menu.classList.contains('show') && !e.target.closest('.float-size-menu') && !e.target.closest('[onclick="openSizeMenu()"]')) {
        menu.classList.remove('show');
      }
    });
    
    // Floating Player Drag
    var fp = document.getElementById('floatPlayer');
    var fc = fp.querySelector('.float-controls');
    var isDragging = false, dragStartX, dragStartY, dragInitX, dragInitY;
    
    fc.addEventListener('mousedown', function(e) {
      if (fp.classList.contains('fullscreen')) return;
      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      var rect = fp.getBoundingClientRect();
      dragInitX = rect.left;
      dragInitY = rect.top;
      fp.style.right = 'auto';
      fp.style.bottom = 'auto';
    });
    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      e.preventDefault();
      fp.style.left = (dragInitX + e.clientX - dragStartX) + 'px';
      fp.style.top = (dragInitY + e.clientY - dragStartY) + 'px';
    });
    document.addEventListener('mouseup', function() { isDragging = false; });
    
    fc.addEventListener('touchstart', function(e) {
      if (fp.classList.contains('fullscreen')) return;
      isDragging = true;
      dragStartX = e.touches[0].clientX;
      dragStartY = e.touches[0].clientY;
      var rect = fp.getBoundingClientRect();
      dragInitX = rect.left;
      dragInitY = rect.top;
      fp.style.right = 'auto';
      fp.style.bottom = 'auto';
    });
    document.addEventListener('touchmove', function(e) {
      if (!isDragging) return;
      e.preventDefault();
      fp.style.left = (dragInitX + e.touches[0].clientX - dragStartX) + 'px';
      fp.style.top = (dragInitY + e.touches[0].clientY - dragStartY) + 'px';
    }, { passive: false });
    document.addEventListener('touchend', function() { isDragging = false; });
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(r => console.log('SW registered')).catch(e => console.log('SW error', e));
    }

    // PiP Mode Detection
    function checkPipMode() {
      if (window.innerHeight < 300 && window.innerWidth < 500) {
        document.body.classList.add('pip-mode');
      } else {
        document.body.classList.remove('pip-mode');
      }
    }
    window.addEventListener('resize', checkPipMode);
    checkPipMode();

    // Report current stream URL to Android for floating player
    setInterval(function() {
      var video = document.querySelector('video');
      if (video && video.src) {
        if (typeof Android !== 'undefined') {
          Android.onVideoPlaying(video.src);
        }
      }
      var iframe = document.getElementById('yonoFrame');
      if (iframe && iframe.src && iframe.style.display !== 'none') {
        if (typeof Android !== 'undefined') {
          Android.onVideoPlaying(iframe.src);
        }
      }
    }, 1000);
  </script>

  <script>
  (function(){
    var colors = ['#ff0000','#ff6600','#ffff00','#00cc00','#0066ff','#8800ff'];
    function rainbow(el){
      if(!el || el.rainbowDone) return;
      el.rainbowDone = true;
      var html = el.innerHTML;
      var parts = [];
      var inTag = false, buf = '';
      for(var k = 0; k < html.length; k++){
        var ch = html[k];
        if(ch === '<'){ inTag = true; if(buf){ parts.push({t:0,v:buf}); buf=''; } buf+=ch; }
        else if(ch === '>'){ buf+=ch; parts.push({t:1,v:buf}); buf=''; inTag=false; }
        else if(!inTag){ buf+=ch; }
        else { buf+=ch; }
      }
      if(buf) parts.push(inTag?{t:1,v:buf}:{t:0,v:buf});
      var out = '';
      var wi = 0;
      parts.forEach(function(p){
        if(p.t === 1){ out += p.v; }
        else {
          var words = p.v.split(/(\s+)/);
          words.forEach(function(w){
            if(w.length > 0){
              out += '<span class="rc" data-w="'+wi+'" style="transition:color 0.4s">'+w+'</span>';
              wi++;
            }
          });
        }
      });
      el.innerHTML = out;
    }
    rainbow(document.getElementById('rkoPowered'));
    rainbow(document.getElementById('rkoCopyright'));
    var offset = 0;
    setInterval(function(){
      var all = document.querySelectorAll('.rc');
      for(var j = 0; j < all.length; j++){
        var idx = parseInt(all[j].getAttribute('data-w'));
        all[j].style.color = colors[(idx + offset) % colors.length];
      }
      offset++;
    }, 400);
  })();
  </script>
